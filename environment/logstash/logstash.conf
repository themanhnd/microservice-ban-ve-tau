input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse trace context from MDC fields
  if [traceId] {
    mutate {
      add_field => { "trace_id" => "%{traceId}" }
    }
  }
  if [spanId] {
    mutate {
      add_field => { "span_id" => "%{spanId}" }
    }
  }

  # Add index routing based on service name
  if [service_name] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "%{service_name}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "xxxx-unknown" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "xxxx-logs-%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }

  # Uncomment for debugging
  # stdout {
  #   codec => rubydebug
  # }
}
