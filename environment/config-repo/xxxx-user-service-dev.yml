server:
  port: 8086
spring:
  datasource:
    url: jdbc:mysql://localhost:3316/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6319
gateway:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:xxxx-user-service}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:1800}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
