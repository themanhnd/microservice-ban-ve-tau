server:
  port: 8888

spring:
  application:
    name: xxxx-config
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SEARCH_LOCATIONS:file:./config-repo,file:../environment/config-repo,classpath:/config-repo}
        encrypt:
          enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

encrypt:
  key: xxxx-microservices-secret-key

management:
  endpoints:
    web:
      exposure:
        include: health,info,encrypt,decrypt
