spring:
  application:
    name: xxxx-event-service
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false
